name: animated_carousel_slider
description: >
  A reusable vertical stacked carousel slider widget for Flutter with smooth
  drag-based animations and a 3D depth effect. Supports infinite cyclic
  scrolling, customizable card height, animation duration, and stack offset.
version: 0.1.3
repository: https://github.com/aditya-magar/animated_carousel_slider

environment:
  sdk: ^3.10.7
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
